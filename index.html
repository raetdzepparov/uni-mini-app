<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подбор университетов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f0f2f5;
            --accent-color: #2AABEE;
            --green: #4caf50;
            --orange: #ff9800;
            --red: #f44336;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #17212B;
                --text-color: #ffffff;
                --card-bg: #232e3c;
                --accent-color: #2AABEE;
            }
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            font-size: 14px;
            color: gray;
            margin-bottom: 20px;
            text-align: center;
        }
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50vh;
            font-size: 18px;
            color: var(--accent-color);
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .card:active {
            transform: scale(0.98);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .uni-name {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
            margin-right: 8px;
        }
        .chance-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
            white-space: nowrap;
        }
        .chance-high { background-color: rgba(76, 175, 80, 0.2); color: var(--green); }
        .chance-medium { background-color: rgba(255, 152, 0, 0.2); color: var(--orange); }
        .chance-low { background-color: rgba(244, 67, 54, 0.2); color: var(--red); }

        .uni-desc {
            font-size: 14px;
            line-height: 1.4;
            opacity: 0.9;
            margin-bottom: 12px;
        }
        .uni-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 12px;
            color: gray;
            margin-bottom: 12px;
        }
        .meta-item {
            background-color: rgba(0,0,0,0.05);
            padding: 4px 8px;
            border-radius: 8px;
        }
        .explanation {
            font-size: 13px;
            font-style: italic;
            padding-top: 8px;
            border-top: 1px solid rgba(128, 128, 128, 0.2);
        }
        .link-btn {
            display: block;
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            background-color: var(--accent-color);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="content">
        <div class="loader">⏳ ИИ подбирает для вас лучшие вузы...</div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Получение session_id из URL (?session_id=xxxx)
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');

        const SERVER_URL = "https://darkroom-disparate-passover.ngrok-free.dev"; // Твой ngrok URL

        async function loadData() {
            if (!sessionId) {
                document.getElementById('content').innerHTML = '<p class="subtitle">Ошибка: ID сессии не найден.</p>';
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/api/get-session/${sessionId}`);
                if (!response.ok) throw new Error('Session not found');
                
                const data = await response.json();
                renderData(data);
            } catch (error) {
                document.getElementById('content').innerHTML = `<p class="subtitle">⚠️ Не удалось загрузить данные. Попробуйте перезапустить бота.</p>`;
                console.error(error);
            }
        }

        function getChanceClass(chance) {
            const c = chance.toLowerCase();
            if (c.includes('высок')) return 'chance-high';
            if (c.includes('сред')) return 'chance-medium';
            return 'chance-low';
        }

        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + ' ₽/год';
        }

        function renderData(data) {
            const container = document.getElementById('content');
            
            let html = `
                <h1>🎓 Топ-5 университетов</h1>
                <p class="subtitle">Направление: ${data.field} | Сумма баллов: ${data.total_score}</p>
            `;

            if (!data.universities || data.universities.length === 0) {
                html += '<p class="subtitle">К сожалению, ИИ не смог найти подходящие вузы.</p>';
                container.innerHTML = html;
                return;
            }

            data.universities.forEach(uni => {
                const chanceText = uni.admission_chance || 'Неизвестно';
                const chanceClass = getChanceClass(chanceText);
                const dorm = uni.dormitory_available ? '🏠 Общежитие есть' : '🚫 Нет общежития';
                
                html += `
                    <div class="card">
                        <div class="card-header">
                            <div class="uni-name">${uni.name}</div>
                            <div class="chance-badge ${chanceClass}">${chanceText}</div>
                        </div>
                        <div class="uni-desc">${uni.description}</div>
                        <div class="uni-meta">
                            <span class="meta-item">💳 ${formatPrice(uni.paid_tuition_price)}</span>
                            <span class="meta-item">${dorm}</span>
                        </div>
                        <div class="explanation">💡 ${uni.explanation}</div>
                        <a href="${uni.vuzopedia_link}" target="_blank" class="link-btn">Подробнее на Vuzopedia</a>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Запуск загрузки
        loadData();
    </script>
</body>
</html>
